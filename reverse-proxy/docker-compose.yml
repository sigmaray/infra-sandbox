services:
  caddy:
    image: caddy:2.10.0-alpine
    container_name: reverse-proxy
    restart: unless-stopped
    env_file: .env
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    networks:
      - projects-net

networks:
  projects-net:
    external: true
    name: projects-net
