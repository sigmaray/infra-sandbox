services:
  caddy:
    image: caddy:2.10.0-alpine
    container_name: reverse-proxy
    restart: unless-stopped
    env_file: .env
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    networks:
      - projects-net
    healthcheck:
      test: ["CMD-SHELL", "wget --server-response --spider http://127.0.0.1:80/ 2>&1 | grep -q 'HTTP/'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

networks:
  projects-net:
    external: true
    name: projects-net
