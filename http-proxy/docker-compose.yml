services:
  http-proxy:
    image: 3proxy/3proxy:0.9.4
    container_name: http-proxy
    restart: unless-stopped
    ports:
      - "${HTTP_PROXY_PORT:-3128}:3128"
      - "${SOCKS_PROXY_PORT:-1080}:1080"
    volumes:
      - ./3proxy.cfg:/etc/3proxy/3proxy.cfg:ro
    networks:
      - projects-net
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 3128 && nc -z localhost 1080"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 64M

networks:
  projects-net:
    external: true
    name: projects-net
