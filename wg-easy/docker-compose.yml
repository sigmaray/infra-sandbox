services:
  wg-easy:
    image: ghcr.io/wg-easy/wg-easy:latest
    container_name: wg-easy
    restart: unless-stopped
    env_file: .env
    environment:
      LANG: ${LANG:-en}
      WG_HOST: ${WG_HOST}
      PASSWORD_HASH: ${PASSWORD_HASH}
      PORT: ${WG_EASY_WEB_PORT:-51821}
      WG_PORT: ${WG_EASY_WG_PORT:-51820}
    ports:
      - "${WG_EASY_WG_PORT:-51820}:${WG_EASY_WG_PORT:-51820}/udp"
      - "${WG_EASY_WEB_PORT:-51821}:${WG_EASY_WEB_PORT:-51821}/tcp"
    volumes:
      - ./data:/etc/wireguard
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    networks:
      - projects-net
    deploy:
      resources:
        limits:
          memory: 256M

networks:
  projects-net:
    external: true
    name: projects-net
