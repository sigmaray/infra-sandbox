services:
  postgres:
    image: postgres:16-alpine
    container_name: shared-postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      DRUPAL_DB_USER: ${DRUPAL_DB_USER}
      DRUPAL_DB_PASSWORD: ${DRUPAL_DB_PASSWORD}
      FRESHRSS_DB_USER: ${FRESHRSS_DB_USER}
      FRESHRSS_DB_PASSWORD: ${FRESHRSS_DB_PASSWORD}
      GO_BLOG_DB_USER: ${GO_BLOG_DB_USER}
      GO_BLOG_DB_PASSWORD: ${GO_BLOG_DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro
    networks:
      - projects-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 768M

volumes:
  postgres_data:

networks:
  projects-net:
    external: true
    name: projects-net
